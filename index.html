<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website ផ្ទាល់ខ្លួនរបស់ខ្ញុំ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kantumruuy Pro', sans-serif;
        }

        body {
            background-color: #0f172a; /* ប្តូរពណ៌ផ្ទៃក្រោយទៅជាពណ៌ងងឹតបែប Tech */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            max-width: 480px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 35px 25px;
            text-align: center;
            border: 1px solid #334155;
        }

        /* Profile Section */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .bio {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Subjects Section */
        .section-title {
            font-size: 16px;
            color: #38bdf8;
            margin-bottom: 15px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .subjects-list {
            list-style: none;
            margin-bottom: 35px;
        }

        .subject-item {
            background: #0f172a;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            display: flex;
            align-items: center;
            font-weight: 500;
            border: 1px solid #334155;
            transition: 0.3s ease;
        }

        .subject-item:hover {
            transform: translateY(-2px);
            border-color: #38bdf8;
            background: #1e293b;
        }

        .subject-item i {
            margin-right: 15px;
            font-size: 20px;
        }

        /* ពណ៌ Icon តាមមុខវិជ្ជា */
        .fa-html5 { color: #f06529; }
        .fa-js { color: #f7df1e; }
        .fa-python { color: #3776ab; }

        /* Social Media Section */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #cbd5e1;
            font-size: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icon.facebook:hover { background: #1877f2; color: white; }
        .social-icon.telegram:hover { background: #0088cc; color: white; }
        .social-icon.tiktok:hover { background: #000000; color: white; border: 1px solid #fff; }
        .social-icon.instagram:hover { background: #e1306c; color: white; }
    </style>
</head>
